{% extends 'base.html' %}
{% block title %}إضافة مستودع{% endblock %}
{% block header %}إضافة مستودع{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">كود المستودع</label>
                        {{ form.code }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">اسم المستودع</label>
                        {{ form.name }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الموقع / العنوان</label>
                        {{ form.location }}
                    </div>
                    <div class="mb-3 form-check form-switch ms-1">
                        {{ form.is_active }}
                        <label class="form-check-label fw-bold" for="id_is_active">نشط</label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">حفظ</button>
                        <a href="{% url 'inventory:warehouse-list' %}" class="btn btn-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
