{% extends 'base.html' %}
{% block title %}إضافة وحدة قياس{% endblock %}
{% block header %}إضافة وحدة قياس{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">الكود (مثال: kg, pcs)</label>
                        {{ form.code }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">اسم الوحدة (مثال: كيلو جرام, قطعة)</label>
                        {{ form.name }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">حفظ</button>
                        <a href="{% url 'inventory:unit-list' %}" class="btn btn-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
