{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}إضافة بند مصروفات{% endblock %}
{% block header %}إضافة بند مصروفات جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">حفظ البند</button>
                        <a href="{% url 'expenses:category-list' %}" class="btn btn-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
