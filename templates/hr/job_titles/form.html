{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}إضافة مسمى وظيفي جديد{% endblock %}
{% block header %}إضافة مسمى وظيفي جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 fw-bold text-success">
                    <i class="bi bi-briefcase-fill me-2"></i> بيانات المسمى الوظيفي
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <hr class="my-4">
                    <div class="d-flex justify-content-between">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">رجوع</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">حفظ المسمى الوظيفي</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
